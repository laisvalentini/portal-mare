<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Maré — Área do Mentorado</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231C1C1C'/%3E%3Ctext x='16' y='17' font-family='Georgia,serif' font-size='13' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'%3Emaré%3C/text%3E%3Cpath d='M5,24 C9,21 13,27 16,24 C19,21 23,27 27,24' stroke='%23C9B99A' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:       #F0EDE7;
      --dark:        #1C1C1C;
      --accent:      #C9B99A;
      --white:       #FFFFFF;
      --text:        #1A1818;
      --muted:       #8A8580;
      --border:      rgba(28,28,28,0.1);
      --shadow:      0 4px 24px rgba(0,0,0,0.07);
      --shadow-lg:   0 8px 40px rgba(0,0,0,0.12);
      --radius:      16px;
      --radius-sm:   10px;
      --radius-xs:   6px;
      --done-bg:     rgba(72,128,80,0.12);
      --done-color:  #316035;
      --active-bg:   rgba(55,110,190,0.12);
      --active-color:#1D5BA0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* LOADING */
    #loading {
      position: fixed; inset: 0;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 200;
    }
    .loading-logo {
      font-size: 42px; font-weight: 900;
      color: var(--dark); letter-spacing: -1px;
      position: relative; display: inline-block;
    }
    .loading-logo svg { position: absolute; bottom: -6px; left: 0; width: 100%; }
    .loading-sub { font-size: 12px; text-transform: uppercase; letter-spacing: 3px; color: var(--muted); font-weight: 500; }
    .loading-bar { width: 180px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .loading-fill { height: 100%; width: 0; background: var(--accent); border-radius: 2px; animation: loadBar 1.6s ease-in-out infinite; }
    @keyframes loadBar {
      0%   { width:0%;  margin-left:0%; }
      50%  { width:60%; margin-left:20%; }
      100% { width:0%;  margin-left:100%; }
    }

    /* ERROR */
    #error-screen {
      display: none; position: fixed; inset: 0;
      background: var(--cream);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 40px; text-align: center;
    }
    #error-screen .err-icon { font-size: 56px; }
    #error-screen h2 { font-size: 22px; font-weight: 700; }
    #error-screen p { font-size: 14px; color: var(--muted); max-width: 440px; line-height: 1.7; }
    #error-screen code { background: var(--dark); color: var(--accent); padding: 3px 10px; border-radius: 5px; font-size: 13px; }

    /* APP */
    #app { display: none; min-height: 100vh; }

    /* TOP BAR */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--dark); height: 56px; padding: 0 28px;
      display: flex; align-items: center; gap: 14px;
    }
    .topbar-logo {
      font-size: 24px; font-weight: 900; color: var(--white);
      text-decoration: none; letter-spacing: -0.5px;
      flex-shrink: 0; position: relative; display: inline-block;
    }
    .topbar-logo svg { position: absolute; bottom: -4px; left: 0; width: 100%; }
    .topbar-spacer { flex: 1; }
    .topbar-name { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 400; }
    .topbar-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--dark); flex-shrink: 0;
    }
    .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* NAV */
    .nav {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 28px; display: flex; overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 56px; z-index: 99;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      padding: 15px 16px; font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 500; background: none; border: none;
      cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
      white-space: nowrap; transition: color .2s, border-color .2s; margin-bottom: -1px;
    }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }

    /* CONTENT */
    .content { padding: 32px 28px; max-width: 980px; margin: 0 auto; }

    /* CARDS */
    .card { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .card + .card { margin-top: 16px; }

    /* SECTION HEADER */
    .sh { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
    .sh h2 { font-size: 20px; font-weight: 700; }
    .sh-sub { font-size: 14px; color: var(--muted); margin-top: -16px; margin-bottom: 22px; }
    .sparkle { color: var(--accent); font-size: 16px; }

    /* TAGS */
    .tag { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 100px; }
    .tag-pending { background: rgba(201,185,154,.2); color: #7A6A50; }
    .tag-active  { background: var(--active-bg); color: var(--active-color); }
    .tag-done    { background: var(--done-bg); color: var(--done-color); }
    .tag-neutral { background: rgba(28,28,28,.07); color: var(--muted); }

    /* PROGRESS */
    .prog-wrap { margin: 10px 0; }
    .prog-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 7px; }
    .prog-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .7s ease; }
    .prog-fill.green { background: var(--done-color); }

    /* GRIDS */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
    .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
    .mb16 { margin-bottom: 16px; }
    .mb24 { margin-bottom: 24px; }

    /* HERO */
    .hero {
      background: var(--dark); border-radius: var(--radius);
      padding: 36px 32px; color: var(--white);
      display: flex; align-items: center; gap: 28px;
      flex-wrap: wrap; margin-bottom: 24px; box-shadow: var(--shadow-lg);
    }
    .hero-avatar {
      width: 76px; height: 76px; border-radius: 50%;
      background: var(--accent); overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: var(--dark);
      border: 3px solid rgba(255,255,255,.15);
    }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-info { flex: 1; min-width: 180px; }
    .hero-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
    .hero-name { font-size: 26px; font-weight: 800; margin-bottom: 4px; color: #fff; }
    .hero-meta { font-size: 13px; color: rgba(255,255,255,.75); }
    .hero-nicho { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 3px; }
    .hero-stats { display: flex; gap: 28px; flex-wrap: wrap; }
    .hero-stat { text-align: center; }
    .hero-stat .num { font-size: 30px; font-weight: 800; color: var(--accent); line-height: 1; }
    .hero-stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.5); margin-top: 4px; }

    /* TASK ROWS */
    .task-row { display: flex; align-items: flex-start; gap: 13px; padding: 14px 0; border-top: 1px solid var(--border); }
    .task-row:first-child { border-top: none; }
    .t-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-top: 1px; }
    .t-check.done   { background: var(--done-color); border-color: var(--done-color); color: #fff; }
    .t-check.active { border-color: var(--active-color); background: var(--active-bg); }
    .t-body { flex: 1; min-width: 0; }
    .t-body h4 { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .t-body p { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .t-meta { flex-shrink: 0; text-align: right; }
    .t-meta .tag { display: block; margin-bottom: 4px; }
    .t-date { font-size: 11px; color: var(--muted); }
    .t-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--text); background: var(--cream); padding: 5px 11px; border-radius: var(--radius-xs); text-decoration: none; margin-top: 7px; transition: background .2s, color .2s; }
    .t-link:hover { background: var(--accent); color: var(--dark); }

    /* MISSÕES */
    .missao-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 0; border-bottom: 1px solid var(--border);
    }
    .missao-item:last-child { border-bottom: none; }
    .missao-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      background: rgba(201,185,154,.15);
    }
    .missao-icon.done     { background: var(--done-bg); }
    .missao-icon.andamento { background: var(--active-bg); }
    .missao-body { flex: 1; min-width: 0; }
    .missao-body h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .missao-body p  { font-size: 12px; color: var(--muted); line-height: 1.55; }
    .missao-prazo { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .missao-meta { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    /* MÓDULOS */
    .modulo-card {
      background: var(--white); border-radius: var(--radius);
      overflow: hidden; margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      transition: box-shadow .2s;
    }
    .modulo-card:hover { box-shadow: var(--shadow); }
    .modulo-head {
      padding: 20px 24px; display: flex; align-items: center;
      gap: 16px; cursor: pointer; user-select: none;
    }
    .modulo-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: var(--dark); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .modulo-icon.done   { background: var(--done-bg); color: var(--done-color); }
    .modulo-icon.active { background: var(--active-bg); color: var(--active-color); }
    .modulo-text { flex: 1; }
    .modulo-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .modulo-text p  { font-size: 12px; color: var(--muted); }
    .modulo-prog { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .modulo-prog-bar { width: 72px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .modulo-prog-fill { height: 100%; background: var(--accent); border-radius: 3px; }
    .modulo-prog-fill.done { background: var(--done-color); }
    .modulo-arrow { color: var(--muted); font-size: 18px; transition: transform .3s; line-height: 1; }
    .modulo-arrow.open { transform: rotate(90deg); }
    .modulo-body { padding: 0 24px 20px; display: none; }
    .modulo-body.open { display: block; }
    .tema-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-top: 1px solid var(--border);
    }
    .tema-item:first-child { border-top: none; }
    .tema-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 10px;
    }
    .tema-check.done   { background: var(--done-color); border-color: var(--done-color); color: #fff; }
    .tema-check.andamento { border-color: var(--active-color); background: var(--active-bg); }
    .tema-label { font-size: 13px; flex: 1; }
    .tema-label.done { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(0,0,0,.2); }

    /* ENCONTROS */
    .enc-item { padding: 22px 0; border-bottom: 1px solid var(--border); }
    .enc-item:last-child { border-bottom: none; }
    .enc-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
    .enc-date { font-size: 12px; font-weight: 700; color: var(--accent); }
    .enc-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .enc-resumo { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 10px; }
    .enc-next { background: var(--cream); border-left: 3px solid var(--accent); border-radius: 0 var(--radius-xs) var(--radius-xs) 0; padding: 10px 14px; }
    .enc-next-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent); margin-bottom: 4px; }
    .enc-next p { font-size: 13px; color: var(--text); line-height: 1.5; }

    /* AULAS BÔNUS */
    .aula-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 16px; }
    .aula-card {
      background: var(--white); border-radius: var(--radius-sm);
      overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform .2s, box-shadow .2s; text-decoration: none; color: var(--text);
      display: flex; flex-direction: column;
    }
    .aula-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .aula-thumb {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      background: var(--dark); display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: rgba(255,255,255,.3);
    }
    .aula-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .aula-info { padding: 14px 16px; flex: 1; }
    .aula-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
    .aula-info p  { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .aula-date { font-size: 11px; color: var(--muted); margin-top: 8px; }
    .aula-play {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; color: var(--dark);
      background: var(--accent); padding: 7px 14px; border-radius: var(--radius-xs);
      margin: 0 16px 16px; text-decoration: none; transition: opacity .2s;
    }
    .aula-play:hover { opacity: .85; }

    /* DOCUMENTS */
    .doc-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap: 12px; margin-bottom: 28px; }
    .doc-item { background: var(--cream); border-radius: var(--radius-sm); padding: 18px 16px; text-decoration: none; color: var(--text); border: 1.5px solid transparent; transition: all .2s; display: flex; flex-direction: column; gap: 7px; }
    .doc-item:hover { border-color: var(--accent); background: var(--white); box-shadow: var(--shadow); }
    .doc-emoji { font-size: 26px; }
    .doc-cat  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .doc-name { font-size: 13px; font-weight: 600; line-height: 1.4; }
    .doc-date { font-size: 11px; color: var(--muted); margin-top: auto; }

    /* AVALIAÇÃO */
    .avaliacao-box { max-width: 620px; margin: 0 auto; }
    .avaliacao-intro { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
    .avaliacao-textarea {
      width: 100%; min-height: 160px; padding: 16px;
      font-family: 'Poppins', sans-serif; font-size: 14px; line-height: 1.65;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--cream); color: var(--text); resize: vertical;
      transition: border-color .2s;
    }
    .avaliacao-textarea:focus { outline: none; border-color: var(--accent); background: var(--white); }
    .avaliacao-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--dark); color: var(--white);
      padding: 12px 28px; border-radius: var(--radius-sm);
      border: none; font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 14px; transition: opacity .2s;
    }
    .avaliacao-btn:hover { opacity: .85; }
    .avaliacao-btn:disabled { opacity: .5; cursor: default; }
    .avaliacao-msg { font-size: 13px; margin-top: 12px; padding: 12px 16px; border-radius: var(--radius-xs); display: none; }
    .avaliacao-msg.ok  { background: var(--done-bg); color: var(--done-color); }
    .avaliacao-msg.err { background: rgba(200,50,50,.1); color: #8B2020; }
    .avaliacao-history { margin-top: 36px; }
    .avaliacao-entry {
      padding: 18px 20px; background: var(--cream); border-radius: var(--radius-sm);
      margin-bottom: 12px; border-left: 3px solid var(--accent);
    }
    .avaliacao-entry-date { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .avaliacao-entry-text { font-size: 13px; line-height: 1.65; color: var(--text); }

    /* METRICS */
    .met-card { background: var(--white); border-radius: var(--radius); padding: 22px; text-align: center; }
    .met-val  { font-size: 28px; font-weight: 800; line-height: 1.1; margin-bottom: 5px; }
    .met-lbl  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .met-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .met-table thead th { background: var(--dark); color: var(--accent); padding: 10px 16px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .met-table thead th:first-child { border-radius: 8px 0 0 8px; }
    .met-table thead th:last-child  { border-radius: 0 8px 8px 0; }
    .met-table tbody td { padding: 11px 16px; border-bottom: 1px solid var(--border); }
    .met-table tbody tr:last-child td { border-bottom: none; }
    .met-table tbody tr:nth-child(even) td { background: rgba(0,0,0,.02); }

    /* DRIVE BANNER */
    .drive-banner { background: var(--dark); border-radius: var(--radius); padding: 24px 28px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .drive-banner-text { flex: 1; min-width: 160px; }
    .drive-banner-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; margin-bottom: 5px; }
    .drive-banner-title { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
    .drive-banner-sub   { font-size: 12px; color: rgba(255,255,255,.5); }
    .btn-accent { background: var(--accent); color: var(--dark); padding: 10px 22px; border-radius: var(--radius-sm); text-decoration: none; font-weight: 700; font-size: 13px; white-space: nowrap; transition: opacity .2s; }
    .btn-accent:hover { opacity: .85; }
    .btn-ghost { background: none; border: 1.5px solid rgba(255,255,255,.2); color: var(--white); padding: 8px 18px; border-radius: var(--radius-sm); text-decoration: none; font-weight: 600; font-size: 12px; white-space: nowrap; font-family: 'Poppins', sans-serif; cursor: pointer; transition: border-color .2s; }
    .btn-ghost:hover { border-color: rgba(255,255,255,.5); }

    /* EMPTY */
    .empty { text-align: center; padding: 52px 24px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* MINI CARD */
    .mini-card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .mini-card-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
    .mini-card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .mini-card-sub   { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    /* RESPONSIVE */
    @media (max-width: 720px) {
      .content { padding: 20px 16px; }
      .topbar, .nav { padding: 0 16px; }
      .hero { padding: 24px 20px; gap: 20px; }
      .hero-name { font-size: 22px; }
      .hero-stats { gap: 20px; }
      .g2, .g3, .g4 { grid-template-columns: 1fr 1fr; }
      .modulo-head { padding: 16px; gap: 12px; }
      .modulo-body { padding: 0 16px 16px; }
      .card { padding: 18px 16px; }
      .aula-grid { grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); }
    }
    @media (max-width: 440px) {
      .g2, .g3, .g4 { grid-template-columns: 1fr; }
      .hero-stats { gap: 16px; }

<div id="app">

<script>
'use strict';

const $ = id => document.getElementById(id);
const getParam = k => new URLSearchParams(location.search).get(k);
const SHEET_ID = getParam('sheet');
const CSV_URL  = tab => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;

/* CSV parser */
function parseCSV(raw) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i], n = raw[i+1];
    if (inQ) {
      if (c==='"' && n==='"') { field+='"'; i++; }
      else if (c==='"') { inQ=false; }
      else { field+=c; }
    } else {
      if      (c==='"') { inQ=true; }
      else if (c===',') { row.push(field.trim()); field=''; }
      else if (c==='\n') { row.push(field.trim()); if(row.some(Boolean)) rows.push(row); row=[]; field=''; }
      else if (c!=='\r') { field+=c; }
    }
  }
  if (field||row.length) { row.push(field.trim()); if(row.some(Boolean)) rows.push(row); }
  return rows;
}

function csvToObjs(raw) {
  const rows = parseCSV(raw);
  if (rows.length < 2) return [];
  const hdr = rows[0].map(h => h.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  return rows.slice(1).map(r => {
    const o = {};
    hdr.forEach((h,i) => o[h] = (r[i]||'').trim());
    return o;
  }).filter(o => Object.values(o).some(Boolean));
}

async function loadTab(tab) {
  const r = await fetch(CSV_URL(tab));
  if (!r.ok) throw new Error(`Aba "${tab}" não encontrada`);
  return csvToObjs(await r.text());
}

/* Date helpers */
function parseDateRaw(s) {
  if (!s) return 0;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [d,m,y]=s.split('/'); return new Date(+y,+m-1,+d).getTime(); }
  if (/^\d{4}-\d{2}-\d{2}$/.test(s))   { const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d).getTime(); }
  return new Date(s).getTime()||0;
}

function fmtDate(s) {
  if (!s) return '';
  let d;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) { const [day,mon,yr]=s.split('/'); d=new Date(+yr,+mon-1,+day); }
  else if (/^\d{4}-\d{2}-\d{2}$/.test(s)) { const [yr,mon,day]=s.split('-'); d=new Date(+yr,+mon-1,+day); }
  else { d = new Date(s); }
  if (isNaN(d)) return s;
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'short', year:'numeric'});
}

function initials(n) {
  return (n||'?').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
}

function cleanMod(s) {
  if (!s) return '';
  return s.replace(/^m?\d+[\s·_\-]*/i,'').replace(/_/g,' ').trim() || s;
}

function docEmoji(cat) {
  cat = (cat||'').toLowerCase();
  if (cat.includes('ferramenta'))                      return '⚡';
  if (cat.includes('video')||cat.includes('aula'))     return '🎬';
  if (cat.includes('guia')||cat.includes('manual'))    return '📘';
  if (cat.includes('template')||cat.includes('modelo')) return '📋';
  if (cat.includes('posicion'))                        return '🧭';
  if (cat.includes('venda')||cat.includes('script'))   return '💰';
  return '📄';
}

function missaoStatusTag(s) {
  if (s==='concluido')    return '<span class="tag tag-done">Concluída</span>';
  if (s==='em andamento') return '<span class="tag tag-active">Em andamento</span>';
  return '<span class="tag tag-pending">Pendente</span>';
}

function numLabel(mod, idx) {
  const m = mod.match(/m?(\d+)/i);
  return m ? String(m[1]).padStart(2,'0') : String(idx).padStart(2,'0');
}

/* DATA */
const D = {
  config:{}, sessoes:[], documentos:[],
  missoes:[], modulos:[], aulas_bonus:[], avaliacoes:[]
};

function parseConfig(rows) {
  if (!rows.length) return {};
  if (rows[0].chave||rows[0].campo) {
    const o={};
    rows.forEach(r=>{ const k=r.chave||r.campo; if(k) o[k.toLowerCase()]=r.valor||r.value||''; });
    return o;
  }
  return rows[0];
}

/* ── RENDER: SEU RESUMO ────────────────────────────────────── */
function renderResumo() {
  const cfg  = D.config;
  const sess = D.sessoes;

  const totalEnc   = parseInt(cfg.total_sessoes||cfg.total_encontros||'0') || 0;
  const realizados = sess.length;
  const aRealizar  = Math.max(0, totalEnc - realizados);
  const pct        = totalEnc ? Math.round(realizados / totalEnc * 100) : 0;

  const name   = cfg.nome || 'Mentorado(a)';
  const fname  = name.split(' ')[0];
  const duracao = cfg.duracao_meses ? `${cfg.duracao_meses} meses` : '';
  const nicho   = cfg.nicho || '';
  const inicio  = cfg.inicio ? ` · Início: ${fmtDate(cfg.inicio)}` : '';

  const avatarContent = cfg.foto_url
    ? `<img src="${cfg.foto_url}" alt="${name}">`
    : initials(name);

  // Últimos encontros
  const ultimosEnc = [...sess].sort((a,b)=>parseDateRaw(b.data)-parseDateRaw(a.data)).slice(0,3);

  // Missões: pendentes + concluídas (max 5 total no dash)
  const missoesPendentes  = D.missoes.filter(m => m.status === 'pendente' || m.status === 'em andamento');
  const missoesConcluidas = D.missoes.filter(m => m.status === 'concluido');
  const missoesVisiveis   = [...missoesPendentes, ...missoesConcluidas].slice(0,5);
  const totalMissoesPend  = missoesPendentes.length;

  // Módulo atual — o último com progresso parcial (não 100% e não zerado)
  let moduloAtualHtml = '';
  if (D.modulos.length) {
    // Agrupar módulos em ordem
    const modMap = new Map();
    D.modulos.forEach(t => {
      const k = t.modulo || 'Geral';
      if (!modMap.has(k)) modMap.set(k, []);
      modMap.get(k).push(t);
    });
    const grupos = [...modMap.entries()].map(([nome, temas]) => {
      const total = temas.length;
      const done  = temas.filter(t => t.status === 'concluido').length;
      const pct   = total ? Math.round(done/total*100) : 0;
      return { nome, temas, total, done, pct };
    });

    // Progresso geral
    const totalGeral = D.modulos.length;
    const doneGeral  = D.modulos.filter(t => t.status === 'concluido').length;
    const pctGeral   = totalGeral ? Math.round(doneGeral/totalGeral*100) : 0;

    // Módulo atual: último com algum progresso mas < 100%; senão o primeiro não iniciado; senão o último
    let atual = grupos.find(g => g.pct > 0 && g.pct < 100);
    if (!atual) atual = grupos.find(g => g.pct === 0) || grupos[grupos.length - 1];

    moduloAtualHtml = `
      <div class="mini-card">
        <div class="mini-card-eyebrow">✦ Módulo atual</div>
        <div class="mini-card-title">${cleanMod(atual.nome)||atual.nome}</div>
        <div class="mini-card-sub">${atual.done} de ${atual.total} temas concluídos · ${atual.pct}%</div>
        <div class="prog-track" style="margin-bottom:14px;"><div class="prog-fill" style="width:${atual.pct}%"></div></div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);font-weight:700;margin-bottom:6px;">Progresso geral dos módulos</div>
        <div class="prog-labels" style="font-size:11px;"><span>${doneGeral} de ${totalGeral} temas</span><strong>${pctGeral}%</strong></div>
        <div class="prog-track" style="margin-bottom:12px;"><div class="prog-fill green" style="width:${pctGeral}%"></div></div>
        <button onclick="nav('modulos')" style="background:var(--cream);border:none;padding:8px 14px;border-radius:var(--radius-xs);font-family:Poppins,sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);">Ver módulos →</button>
      </div>`;
  } else {
    moduloAtualHtml = `
      <div class="mini-card">
        <div class="mini-card-eyebrow">✦ Módulo atual</div>
        <div class="mini-card-title" style="color:var(--muted);font-size:13px;">Preencha a aba módulos na planilha</div>
      </div>`;
  }

  // Última aula bônus
  const ultimaAula = [...D.aulas_bonus].sort((a,b)=>parseDateRaw(b.data)-parseDateRaw(a.data))[0];
  let aulaHtml = '';
  if (ultimaAula) {
    aulaHtml = `
      <div class="mini-card">
        <div class="mini-card-eyebrow">✦ Aula bônus</div>
        ${ultimaAula.thumbnail_url
          ? `<img src="${ultimaAula.thumbnail_url}" alt="${ultimaAula.titulo}" style="width:100%;border-radius:8px;margin-bottom:10px;aspect-ratio:16/9;object-fit:cover;">`
          : `<div style="width:100%;aspect-ratio:16/9;background:var(--dark);border-radius:8px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:32px;">🎬</div>`
        }
        <div class="mini-card-title" style="font-size:14px;">${ultimaAula.titulo||'Aula bônus'}</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
          ${ultimaAula.video_url ? `<a href="${ultimaAula.video_url}" target="_blank" class="btn-accent" style="font-size:12px;padding:7px 14px;">▶ Assistir</a>` : ''}
          <button onclick="nav('aulas')" style="background:var(--cream);border:none;padding:7px 14px;border-radius:var(--radius-xs);font-family:Poppins,sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);">Ver todas →</button>
        </div>
      </div>`;
  } else {
    aulaHtml = `
      <div class="mini-card">
        <div class="mini-card-eyebrow">✦ Aulas bônus</div>
        <div class="mini-card-title" style="color:var(--muted);font-size:13px;">Nenhuma aula publicada ainda</div>
      </div>`;
  }

  // Ferramentas (categoria = 'ferramenta' na aba documentos)
  const ferramentas = D.documentos.filter(d => (d.categoria||'').toLowerCase().includes('ferramenta'));
  const ferramentasResumoHtml = ferramentas.length ? `
    <div class="card mb24">
      <div class="sh" style="margin-bottom:16px;"><span class="sparkle">✦</span><h2>Ferramentas</h2></div>
      <div class="g2">
        ${ferramentas.map(f => `
          <a href="${f.link||'#'}" target="${f.link?'_blank':'_self'}" class="doc-item" style="background:var(--cream);">
            <div class="doc-emoji">${docEmoji(f.categoria)}</div>
            <div class="doc-cat">${f.categoria||'Ferramenta'}</div>
            <div class="doc-name">${f.nome||'—'}</div>
            ${f.data?`<div class="doc-date">${f.data}</div>`:''}
          </a>`).join('')}
      </div>
    </div>` : '';

  // HTML das missões no resumo
  const missoesHtml = missoesVisiveis.length
    ? missoesVisiveis.map(m => {
        const done    = m.status === 'concluido';
        const active  = m.status === 'em andamento';
        return `
          <div class="missao-item">
            <div class="missao-icon ${done?'done':active?'andamento':''}">${done?'✅':active?'🔄':'🎯'}</div>
            <div class="missao-body">
              <h4${done?' style="color:var(--muted);text-decoration:line-through;"':''}>${m.titulo||'Missão'}</h4>
              ${m.descricao?`<p>${m.descricao}</p>`:''}
              ${m.prazo&&!done?`<div class="missao-prazo">⏰ ${m.prazo}</div>`:''}
              ${m.link&&!done?`<a href="${m.link}" target="_blank" class="t-link">📋 Abrir →</a>`:''}
            </div>
            <div class="missao-meta">${missaoStatusTag(m.status)}</div>
          </div>`;
      }).join('')
    : `<div style="padding:16px 0;color:var(--muted);font-size:13px;">Nenhuma missão ativa no momento.</div>`;

  const encHtml = ultimosEnc.length
    ? ultimosEnc.map(s => `
        <div class="task-row">
          <div class="t-check done">✓</div>
          <div class="t-body">
            <h4>${s.tema||'Encontro'}</h4>
            <p>${s.modulo ? cleanMod(s.modulo)+' · ' : ''}${fmtDate(s.data)}</p>
          </div>
        </div>`).join('')
    : `<div style="padding:16px 0;color:var(--muted);font-size:13px;">Nenhum encontro registrado ainda.</div>`;

  $('view-resumo').innerHTML = `
    <div class="hero mb24">
      <div class="hero-avatar">${avatarContent}</div>
      <div class="hero-info">
        <div class="hero-eyebrow">✦ Mentoria Maré</div>
        <div class="hero-name">Olá, ${fname}!</div>
        <div class="hero-meta">Mentoria Individual${duracao ? ' · ' + duracao : ''}${inicio}</div>
        ${nicho ? `<div class="hero-nicho">${nicho}</div>` : ''}
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="num">${pct}%</div>
          <div class="lbl">Progresso</div>
        </div>
        <div class="hero-stat">
          <div class="num">${realizados}</div>
          <div class="lbl">Realizados</div>
        </div>
        <div class="hero-stat">
          <div class="num">${aRealizar}</div>
          <div class="lbl">A realizar</div>
        </div>
      </div>
    </div>

    <div class="card mb24">
      <div class="sh" style="margin-bottom:14px;">
        <span class="sparkle">✦</span><h2>Progresso da Mentoria</h2>
      </div>
      <div class="prog-wrap">
        <div class="prog-labels">
          <span>${realizados} de ${totalEnc||'?'} encontros realizados</span>
          <strong>${pct}%</strong>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <div class="card mb24">
      <div class="sh" style="margin-bottom:4px;">
        <span class="sparkle">✦</span><h2>Suas Missões</h2>
        ${totalMissoesPend > 0 ? `<span class="tag tag-pending" style="margin-left:auto;">${totalMissoesPend} pendente${totalMissoesPend>1?'s':''}</span>` : ''}
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:18px;">Tarefas e atividades para você avançar na mentoria</div>
      ${missoesHtml}
      ${D.missoes.filter(m=>m.status!=='invisivel').length > 5 ? `
        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px;">
          <button onclick="nav('missoes')" style="background:var(--cream);border:none;padding:8px 16px;border-radius:var(--radius-xs);font-family:Poppins,sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);">Ver todas as missões →</button>
        </div>` : ''}
    </div>

    <div class="card mb24">
      <div class="sh"><span class="sparkle">✦</span><h2>Últimos Encontros</h2></div>
      ${encHtml}
      ${sess.length>3?`<div style="margin-top:12px;">
        <button onclick="nav('encontros')" style="background:var(--cream);border:none;padding:8px 14px;border-radius:var(--radius-xs);font-family:Poppins,sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);">Ver histórico completo →</button>
      </div>`:''}
    </div>

    <div class="g2 mb24">
      ${moduloAtualHtml}
      ${aulaHtml}
    </div>

    ${ferramentasResumoHtml}

    ${cfg.drive_pasta_link ? `
    <div class="drive-banner">
      <div class="drive-banner-text">
        <div class="drive-banner-eyebrow">✦ SEUS ARQUIVOS</div>
        <div class="drive-banner-title">Pasta no Google Drive</div>
        <div class="drive-banner-sub">Documentos, prints e entregas da sua mentoria</div>
      </div>
      <a href="${cfg.drive_pasta_link}" target="_blank" class="btn-accent">Abrir pasta →</a>
    </div>` : ''}
  `;
}

/* ── RENDER: MÓDULOS ───────────────────────────────────────── */
function renderModulos() {
  const modData = D.modulos;

  if (!modData.length) {
    $('view-modulos').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>Nenhum módulo encontrado na planilha.</p></div>`;
    return;
  }

  // Agrupar por módulo
  const map = new Map();
  modData.forEach(t => {
    const k = t.modulo || 'Geral';
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(t);
  });
  const groups = [...map.entries()];

  // Progresso geral
  const totalGeral = modData.length;
  const doneGeral  = modData.filter(t => t.status === 'concluido').length;
  const pctGeral   = totalGeral ? Math.round(doneGeral/totalGeral*100) : 0;

  let idx = 0;
  const cardsHtml = groups.map(([mod, temas]) => {
    idx++;
    const total = temas.length;
    const done  = temas.filter(t => t.status === 'concluido').length;
    const andamento = temas.filter(t => t.status === 'em andamento').length;
    const pct   = total ? Math.round(done/total*100) : 0;
    const allDone = done === total && total > 0;
    const hasActive = andamento > 0;
    const iconCls  = allDone ? 'done' : hasActive ? 'active' : '';
    const fillCls  = allDone ? 'done' : '';
    const label    = numLabel(mod, idx);
    const modTitle = cleanMod(mod) || mod;

    const temasHtml = temas.map(t => {
      const isDone     = t.status === 'concluido';
      const isAndamento= t.status === 'em andamento';
      return `
        <div class="tema-item">
          <div class="tema-check ${isDone?'done':isAndamento?'andamento':''}">${isDone?'✓':isAndamento?'•':''}</div>
          <span class="tema-label ${isDone?'done':''}">${t.tema||'—'}</span>
          ${isDone ? '<span class="tag tag-done" style="font-size:9px;">Concluído</span>' :
            isAndamento ? '<span class="tag tag-active" style="font-size:9px;">Em andamento</span>' :
            '<span class="tag tag-neutral" style="font-size:9px;">A iniciar</span>'}
        </div>`;
    }).join('');

    return `
      <div class="modulo-card">
        <div class="modulo-head" onclick="toggleMod(this)">
          <div class="modulo-icon ${iconCls}">${allDone?'✓':label}</div>
          <div class="modulo-text">
            <h3>${modTitle}</h3>
            <p>${total} tema${total!==1?'s':''} · ${done} concluído${done!==1?'s':''}</p>
          </div>
          <div class="modulo-prog">
            <div class="modulo-prog-bar"><div class="modulo-prog-fill ${fillCls}" style="width:${pct}%"></div></div>
            <span>${pct}%</span>
          </div>
          <div class="modulo-arrow">›</div>
        </div>
        <div class="modulo-body">${temasHtml}</div>
      </div>`;
  }).join('');

  $('view-modulos').innerHTML = `
    <div class="sh mb24"><span class="sparkle">✦</span><h2>Módulos da Mentoria</h2></div>
    <div class="card mb24">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;">Progresso geral</div>
      <div class="prog-wrap">
        <div class="prog-labels">
          <span>${doneGeral} de ${totalGeral} temas concluídos</span>
          <strong>${pctGeral}%</strong>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pctGeral}%"></div></div>
      </div>
    </div>
    ${cardsHtml}`;
}

function toggleMod(head) {
  const body  = head.nextElementSibling;
  const arrow = head.querySelector('.modulo-arrow');
  const open  = body.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

/* ── RENDER: MISSÕES ───────────────────────────────────────── */
function renderMissoes() {
  const visiveis = D.missoes.filter(m => m.status !== 'invisivel');

  if (!visiveis.length) {
    $('view-missoes').innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><p>Nenhuma missão disponível no momento.</p></div>`;
    return;
  }

  const pendentes  = visiveis.filter(m => m.status === 'pendente' || m.status === 'em andamento');
  const concluidas = visiveis.filter(m => m.status === 'concluido');

  function missaoHtml(m) {
    const done = m.status === 'concluido';
    return `
      <div class="missao-item">
        <div class="missao-icon ${done?'done':''}">${done?'✅':'🎯'}</div>
        <div class="missao-body">
          <h4${done?' style="color:var(--muted);text-decoration:line-through;"':''}>${m.titulo||'Missão'}</h4>
          ${m.descricao?`<p>${m.descricao}</p>`:''}
          ${m.prazo&&!done?`<div class="missao-prazo">⏰ Prazo: ${m.prazo}</div>`:''}
          ${m.link&&!done?`<a href="${m.link}" target="_blank" class="t-link">📋 Acessar →</a>`:''}
        </div>
        <div class="missao-meta">${missaoStatusTag(m.status)}</div>
      </div>`;
  }

  const pendHtml = pendentes.length
    ? pendentes.map(missaoHtml).join('')
    : `<div style="padding:16px 0;color:var(--muted);font-size:13px;">Nenhuma missão pendente 🎉</div>`;

  const concHtml = concluidas.length
    ? concluidas.map(missaoHtml).join('')
    : '';

  $('view-missoes').innerHTML = `
    <div class="sh mb24"><span class="sparkle">✦</span><h2>Missões</h2></div>
    ${pendentes.length ? `
    <div class="card mb16">
      <div class="sh" style="margin-bottom:4px;"><h2 style="font-size:16px;">🎯 Pendentes</h2>
        <span class="tag tag-pending" style="margin-left:auto;">${pendentes.length} missã${pendentes.length!==1?'ões':'o'}</span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Complete essas missões para avançar na mentoria</div>
      ${pendHtml}
    </div>` : `<div class="card mb16">${pendHtml}</div>`}
    ${concluidas.length ? `
    <div class="card">
      <div class="sh" style="margin-bottom:16px;"><h2 style="font-size:16px;">✅ Concluídas</h2>
        <span class="tag tag-done" style="margin-left:auto;">${concluidas.length}</span>
      </div>
      ${concHtml}
    </div>` : ''}`;
}

/* ── RENDER: ENCONTROS ─────────────────────────────────────── */
function renderEncontros() {
  const sorted = [...D.sessoes].sort((a,b)=>parseDateRaw(b.data)-parseDateRaw(a.data));
  if (!sorted.length) {
    $('view-encontros').innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>Nenhum encontro registrado ainda.</p></div>`;
    return;
  }
  const html = sorted.map(s => `
    <div class="enc-item">
      <div class="enc-header">
        <span class="enc-date">${fmtDate(s.data)}</span>
        ${s.modulo?`<span class="tag tag-neutral">${cleanMod(s.modulo)}</span>`:''}
      </div>
      <div class="enc-title">${s.tema||'Encontro sem título'}</div>
      ${s.resumo?`<div class="enc-resumo">${s.resumo}</div>`:''}
      ${s.proximos_passos?`
        <div class="enc-next">
          <div class="enc-next-label">⟶ Próximos passos</div>
          <p>${s.proximos_passos}</p>
        </div>`:''}
    </div>`).join('');
  $('view-encontros').innerHTML = `<div class="sh mb24"><span class="sparkle">✦</span><h2>Histórico de Encontros</h2></div><div class="card">${html}</div>`;
}

/* ── RENDER: AULAS BÔNUS ───────────────────────────────────── */
function renderAulas() {
  const aulas = [...D.aulas_bonus].sort((a,b)=>parseDateRaw(b.data)-parseDateRaw(a.data));
  if (!aulas.length) {
    $('view-aulas').innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><p>Nenhuma aula bônus publicada ainda.</p></div>`;
    return;
  }
  const html = aulas.map(a => `
    <a href="${a.video_url||'#'}" target="${a.video_url?'_blank':'_self'}" class="aula-card">
      <div class="aula-thumb">
        ${a.thumbnail_url
          ? `<img src="${a.thumbnail_url}" alt="${a.titulo}">`
          : '🎬'}
      </div>
      <div class="aula-info">
        <h4>${a.titulo||'Aula bônus'}</h4>
        ${a.descricao?`<p>${a.descricao}</p>`:''}
        ${a.data?`<div class="aula-date">${fmtDate(a.data)}</div>`:''}
      </div>
      ${a.video_url ? `<span class="aula-play">▶ Assistir</span>` : ''}
    </a>`).join('');
  $('view-aulas').innerHTML = `<div class="sh mb24"><span class="sparkle">✦</span><h2>Aulas Bônus</h2></div><div class="aula-grid">${html}</div>`;
}

/* ── RENDER: DOCUMENTOS ────────────────────────────────────── */
function renderDocumentos() {
  const docs = D.documentos;
  if (!docs.length) {
    $('view-documentos').innerHTML = `<div class="empty"><div class="empty-icon">📁</div><p>Nenhum documento disponível ainda.</p></div>`;
    return;
  }
  const catMap = new Map();
  docs.forEach(d => {
    const c = d.categoria||'Geral';
    if ((c).toLowerCase().includes('ferramenta')) return; // já aparece na seção Ferramentas
    if (!catMap.has(c)) catMap.set(c,[]);
    catMap.get(c).push(d);
  });
  const html = [...catMap.entries()].map(([cat,items]) => `
    <div class="doc-section-title">${cat}</div>
    <div class="doc-grid">
      ${items.map(d => `
        <a href="${d.link||'#'}" target="${d.link?'_blank':'_self'}" class="doc-item">
          <div class="doc-emoji">${docEmoji(d.categoria)}</div>
          <div class="doc-cat">${d.categoria||'Documento'}</div>
          <div class="doc-name">${d.nome||'—'}</div>
          ${d.data?`<div class="doc-date">${fmtDate(d.data)}</div>`:''}
        </a>`).join('')}
    </div>`).join('');
  const ferramentasDoc = docs.filter(d => (d.categoria||'').toLowerCase().includes('ferramenta'));
  const ferramentasHtml = ferramentasDoc.length ? `
    <div class="doc-section-title">Ferramentas bônus</div>
    <div class="doc-grid" style="margin-bottom:32px;">
      ${ferramentasDoc.map(f => `
        <a href="${f.link||'#'}" target="${f.link?'_blank':'_self'}" class="doc-item">
          <div class="doc-emoji">${docEmoji(f.categoria)}</div>
          <div class="doc-cat">${f.categoria||'Ferramenta'}</div>
          <div class="doc-name">${f.nome||'—'}</div>
          ${f.data?`<div class="doc-date">${fmtDate(f.data)}</div>`:''}
        </a>`).join('')}
    </div>` : '';
  $('view-documentos').innerHTML = `<div class="sh mb24"><span class="sparkle">✦</span><h2>Biblioteca de Documentos</h2></div>${ferramentasHtml}${html}`;
}

/* ── RENDER: AVALIAÇÃO ─────────────────────────────────────── */
function renderAvaliacao() {
  const webappUrl = D.config.webapp_url || '';
  const nome      = D.config.nome || '';

  const historicoHtml = D.avaliacoes.length
    ? `<div class="avaliacao-history">
        <div style="font-size:13px;font-weight:600;margin-bottom:16px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Avaliações anteriores</div>
        ${D.avaliacoes.map(a => `
          <div class="avaliacao-entry">
            <div class="avaliacao-entry-date">${a.data||'—'}</div>
            <div class="avaliacao-entry-text">${(a.texto||'').replace(/\n/g,'<br>')}</div>
          </div>`).join('')}
      </div>`
    : '';

  $('view-avaliacao').innerHTML = `
    <div class="sh mb24"><span class="sparkle">✦</span><h2>Avaliação</h2></div>
    <div class="card">
      <div class="avaliacao-box">
        <p class="avaliacao-intro">
          Sua opinião é muito importante para melhorar a mentoria. Compartilhe como está sendo sua experiência, o que está te ajudando e o que poderia ser melhor.
        </p>
        ${webappUrl ? `
          <textarea id="aval-texto" class="avaliacao-textarea" placeholder="Como está sendo sua experiência na mentoria? O que está te ajudando mais? Alguma sugestão?"></textarea>
          <div>
            <button id="aval-btn" class="avaliacao-btn" onclick="enviarAvaliacao('${webappUrl}','${nome}')">
              ✦ Enviar avaliação
            </button>
          </div>
          <div id="aval-msg" class="avaliacao-msg"></div>
        ` : `
          <div style="background:var(--cream);border-radius:var(--radius-sm);padding:20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7;">
            <div style="font-size:28px;margin-bottom:8px;">⚙️</div>
            A caixa de avaliação ainda não foi configurada.<br>
            Peça para sua mentora ativar esta funcionalidade.
          </div>
        `}
        ${historicoHtml}
      </div>
    </div>`;
}

async function enviarAvaliacao(webappUrl, nome) {
  const textarea = $('aval-texto');
  const btn      = $('aval-btn');
  const msg      = $('aval-msg');
  const texto    = (textarea.value||'').trim();

  if (!texto) {
    msg.className = 'avaliacao-msg err';
    msg.style.display = 'block';
    msg.textContent = 'Escreva sua avaliação antes de enviar.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Enviando...';
  msg.style.display = 'none';

  try {
    await fetch(webappUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto, nome, data: new Date().toISOString() })
    });

    textarea.value = '';
    btn.disabled = false;
    btn.textContent = '✦ Enviar avaliação';
    msg.className = 'avaliacao-msg ok';
    msg.style.display = 'block';
    msg.textContent = '✓ Avaliação enviada com sucesso! Obrigada pelo seu feedback.';

    setTimeout(() => { msg.style.display = 'none'; }, 6000);
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '✦ Enviar avaliação';
    msg.className = 'avaliacao-msg err';
    msg.style.display = 'block';
    msg.textContent = 'Erro ao enviar. Tente novamente em alguns instantes.';
  }
}

/* ── NAVIGATION ────────────────────────────────────────────── */
const VIEWS = ['resumo','modulos','missoes','encontros','aulas','documentos','avaliacao'];

function nav(name) {
  VIEWS.forEach(v => $('view-'+v).style.display = v===name ? '' : 'none');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view===name));
  window.scrollTo(0,0);
}

$('main-nav').addEventListener('click', e => {
  const b = e.target.closest('.nav-btn');
  if (b) nav(b.dataset.view);
});

/* ── BOOT ──────────────────────────────────────────────────── */
async function boot() {
  if (!SHEET_ID) {
    $('loading').style.display = 'none';
    $('error-screen').style.display = 'flex';
    return;
  }
  try {
    const [cfgR, sessR, docsR, missR, modR, aulasR, avalR] = await Promise.allSettled([
      loadTab('config'), loadTab('sessoes'), loadTab('documentos'),
      loadTab('missoes'), loadTab('modulos'), loadTab('aulas_bonus'), loadTab('avaliacoes'),
    ]);

    D.config      = parseConfig(cfgR.value || []);
    D.sessoes     = sessR.value  || [];
    D.documentos  = docsR.value  || [];
    D.missoes     = missR.value  || [];
    D.modulos     = modR.value   || [];
    D.aulas_bonus = aulasR.value || [];
    D.avaliacoes  = avalR.value  || [];

    const name = D.config.nome || 'Mentorado(a)';
    $('topbar-name').textContent = name;
    const av = $('topbar-avatar');
    if (D.config.foto_url) av.innerHTML = `<img src="${D.config.foto_url}" alt="${name}">`;
    else av.textContent = initials(name);

    renderResumo();
    renderModulos();
    renderMissoes();
    renderEncontros();
    renderAulas();
    renderDocumentos();
    renderAvaliacao();

    $('loading').style.display = 'none';
    $('app').style.display = 'block';
    nav('resumo');
  } catch(err) {
    console.error(err);
    $('loading').style.display = 'none';
    $('error-screen').style.display = 'flex';
  }
}

boot();
</script>
