<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yes We Grow · Portal do Cliente</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231C1C1C'/><text y='24' x='4' font-size='22'>🌱</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0EDE7;    --dark: #1C1C1C;
    --accent: #C9B99A
    --white: #FFFFFF;
    --text: #1A1818;
    --muted: #888;
    --border: #E2DDD6;
    --card-bg: #FFFFFF;
    --macro1: #2E6B52; --macro1l: #D4EAE0;
    --macro2: #7A5230; --macro2l: #EAD9C8;
    --macro3: #2E506B; --macro3l: #C8DCEA;
    --macro4: #6B2E52; --macro4l: #EAC8DC;
    --macro5: #506B2E; --macro5l: #DCEAC8;
    --macro6: #2E2E6B; --macro6l: #C8C8EA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-top: 56px; }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--dark); height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-brand .logo { height: 28px; width: auto; filter: brightness(0) invert(1); }
  .topbar-brand .sep { color: var(--accent); opacity: 0.5; }
  .topbar-brand .client { font-size: 12px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .topbar-right { font-size: 11px; color: #666; }

  /* ── NAV ── */
  .nav {
    background: var(--white); border-bottom: 1px solid var(--border);
    display: flex; gap: 0; padding: 0 32px;
    position: sticky; top: 56px; z-index: 99;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .nav-btn {
    background: none; border: none; cursor: pointer;
    padding: 0 20px; height: 48px;
    font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .nav-btn:hover { color: var(--dark); }
  .nav-btn.active { color: var(--dark); border-bottom-color: var(--accent); }

  /* ── MAIN ── */
  .main { padding: 32px; max-width: 1100px; margin: 0 auto; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── LOADING ── */
  .loading-screen {
    position: fixed; inset: 0; background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; z-index: 1000;
  }
  .loading-screen .logo-big { font-size: 36px; font-weight: 900; color: var(--white); }
  .loading-screen .sub { font-size: 13px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .loading-bar { width: 200px; height: 3px; background: #333; border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .loading-fill { height: 100%; background: var(--accent); width: 0%; animation: load 1.5s ease forwards; }
  @keyframes load { to { width: 100%; } }

  /* ── RESUMO PAGE ── */
  .hero-card {
    background: var(--dark); border-radius: 16px; padding: 28px 32px;
    margin-bottom: 20px;
  }
  .hero-card h1 { font-size: 26px; font-weight: 900; color: var(--white); line-height: 1.2; }
  .hero-card p { font-size: 13px; color: #888; margin-top: 6px; }

  .journey-strip { display: flex; align-items: center; margin-bottom: 24px; }
  .journey-pill {
    display: flex; align-items: center; gap: 8px; border-radius: 20px;
    padding: 6px 14px 6px 8px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.4px; text-transform: uppercase; white-space: nowrap;
  }
  .journey-pill.current { background: var(--dark); color: var(--white); }
  .journey-pill.next { background: var(--white); border: 1.5px solid var(--accent); color: var(--dark); }
  .journey-num {
    width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: var(--dark);
    font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .journey-line { flex: 1; border-top: 2px dashed var(--accent); margin: 0 10px; }
  @media(max-width:600px){
    .journey-strip { flex-direction: column; align-items: flex-start; gap: 10px; }
    .journey-line { display: none; }
  }

  .destaques-row { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .destaque-pill {
    display: flex; align-items: center; gap: 7px; background: var(--white);
    border: 1px solid var(--border); border-radius: 20px; padding: 7px 14px;
    font-size: 11px; font-weight: 600;
  }

  .section-title { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }

  .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  @media(max-width:800px){ .macro-grid { grid-template-columns: 1fr 1fr; } }
  @media(max-width:500px){ .macro-grid { grid-template-columns: 1fr; } }

  .macro-card {
    background: var(--white); border-radius: 14px; padding: 20px;
    border: 1px solid var(--border); cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .macro-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .mc-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .mc-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .macro-card .mc-num { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .macro-card .mc-name { font-size: 13px; font-weight: 700; color: var(--dark); line-height: 1.3; }
  .mc-bar-wrap { background: var(--bg); border-radius: 4px; height: 6px; margin-bottom: 10px; overflow: hidden; }
  .mc-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .mc-counts { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .mc-counts .done { font-weight: 700; }

  /* ── MÉTRICAS DA MARCA ── */
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  @media(max-width:800px){ .metric-grid { grid-template-columns: 1fr 1fr; } }
  @media(max-width:500px){ .metric-grid { grid-template-columns: 1fr; } }
  .metric-card { background: var(--white); border-radius: 14px; padding: 20px; border: 1px solid var(--border); }
  .metric-card .m-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
  .metric-card .m-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .metric-card .m-icon { font-size: 14px; flex-shrink: 0; }
  .metric-card .m-value { font-size: 26px; font-weight: 800; color: var(--dark); line-height: 1.1; }
  .metric-card .m-delta { display: inline-block; margin-top: 8px; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .m-delta.up { background: #D4EAD4; color: #2E6B2E; }
  .m-delta.down { background: #FAD4D4; color: #8B2E2E; }
  .m-delta.flat { background: var(--bg); color: var(--muted); }

  /* ── CRONOGRAMA PAGE ── */
  .macro-section { margin-bottom: 20px; background: var(--white); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .macro-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 24px; cursor: pointer;
    transition: background 0.15s;
  }
  .macro-header:hover { background: #FAFAF8; }
  .macro-num-badge {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; flex-shrink: 0;
  }
  .macro-header-info { flex: 1; }
  .macro-header-info h3 { font-size: 14px; font-weight: 700; color: var(--dark); }
  .macro-header-info p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .macro-prog-wrap { display: flex; align-items: center; gap: 10px; }
  .macro-mini-bar { width: 100px; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .macro-mini-fill { height: 100%; border-radius: 3px; }
  .macro-pct { font-size: 13px; font-weight: 800; }
  .macro-chevron { font-size: 16px; color: var(--muted); transition: transform 0.2s; }
  .macro-section.open .macro-chevron { transform: rotate(180deg); }

  .macro-body { display: none; padding: 20px 24px 24px; border-top: 1px solid var(--border); }
  .macro-section.open .macro-body { display: block; }

  .entregavel-block { margin-bottom: 20px; }
  .entregavel-block:first-child { margin-top: 0; }
  .entregavel-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }

  .task-row {
    display: grid; grid-template-columns: 1fr 120px;
    gap: 12px; align-items: center;
    padding: 10px 12px; border-radius: 8px;
    font-size: 12px; transition: background 0.1s;
  }
  .task-row:hover { background: var(--bg); }
  .task-row .t-name { font-weight: 500; color: var(--dark); line-height: 1.4; }
  .task-row .t-resp { color: var(--muted); font-size: 11px; }
  .task-row .t-date { color: var(--muted); font-size: 11px; text-align: center; }
  .task-row .t-obs { color: #999; font-size: 11px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .task-header-row {
    display: grid; grid-template-columns: 1fr 120px;
    gap: 12px; padding: 6px 12px;
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: #AAA; border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }

  .status-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
    white-space: nowrap;
  }
  .s-nao { background: #F0EDE7; color: #888; }
  .s-em  { background: #FFF3CD; color: #8B6914; }
  .s-conc { background: #D4EAD4; color: #2E6B2E; }

  /* ── MATERIAIS ── */
  .materiais-group { margin-bottom: 32px; }
  .materiais-group-title {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .materiais-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;
  }
  .material-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; display: flex; flex-direction: column; gap: 8px;
    transition: box-shadow 0.15s, transform 0.15s;
    text-decoration: none; color: inherit;
  }
  .material-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .material-card-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
  }
  .material-card-title {
    font-size: 14px; font-weight: 700; color: var(--dark); line-height: 1.3;
  }
  .material-card-desc {
    font-size: 12px; color: var(--muted); line-height: 1.5;
  }
  .material-card-link {
    margin-top: 4px; font-size: 11px; font-weight: 600;
    color: var(--accent); display: flex; align-items: center; gap: 4px;
  }
  .materiais-empty {
    text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px;
  }
  .materiais-empty .icon { font-size: 32px; margin-bottom: 12px; }

  @media(max-width:700px){
    .task-row { grid-template-columns: 1fr auto; }
    .task-row .t-resp, .task-row .t-date, .task-row .t-obs { display: none; }
    .task-header-row { display: none; }
    .macro-prog-wrap { display: none; }
    .materiais-grid { grid-template-columns: 1fr; }
  }

  .empty-msg { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <img src="https://cdn.vnda.com.br/yeswegrow/2022/06/23/11_6_6_665_10_5_3_399_Logo.svg" alt="Yes We Grow" style="height:60px;width:auto;filter:brightness(0) invert(1);margin-bottom:8px;">
  <div class="sub">Portal do Cliente</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="topbar">
  <div class="topbar-brand">
    <img class="logo" src="https://cdn.vnda.com.br/yeswegrow/2022/06/23/11_6_6_665_10_5_3_399_Logo.svg" alt="Yes We Grow">
    <span class="sep">·</span>
    <span class="client">Portal do Cliente</span>
  </div>
  <div class="topbar-right" id="last-update">—</div>
</div>

<nav class="nav">
  <button class="nav-btn active" data-view="resumo">Resumo</button>
  <button class="nav-btn" data-view="cronograma">Setup</button>
  <button class="nav-btn" data-view="mensais">Entregas Mensais</button>
  <button class="nav-btn" data-view="materiais">Anexos</button>
</nav>

<div class="main">

  <!-- ── RESUMO ── -->
  <div class="view active" id="view-resumo">
    <div class="hero-card" id="hero-card">
      <h1 id="hero-title">Yes We Grow</h1>
      <p id="hero-sub">Carregando dados...</p>
    </div>

    <div class="journey-strip" id="journey-strip">
      <div class="journey-pill current"><span class="journey-num">1</span><span id="journey-setup-label">Setup · —%</span></div>
      <div class="journey-line"></div>
      <div class="journey-pill next"><span class="journey-num">2</span><span id="journey-mensal-label">Entregas mensais · recorrente</span></div>
    </div>

    <div class="section-title" id="destaques-title" style="display:none">✦ Destaques da semana</div>
    <div class="destaques-row" id="destaques-row"></div>

    <div class="section-title">✦ Atividades do Setup</div>
    <div class="macro-grid" id="macro-grid"></div>

    <div class="section-title" id="mensal-resumo-title">✦ Entregas do mês</div>
    <div class="macro-grid" id="mensal-resumo-grid"></div>

    <div class="section-title" id="metricas-title" style="display:none">✦ A Marca em Números</div>
    <div class="metric-grid" id="metric-grid"></div>
  </div>

  <!-- ── SETUP (cronograma) ── -->
  <div class="view" id="view-cronograma">
    <div id="cronograma-sections"></div>
  </div>

  <!-- ── ENTREGAS MENSAIS ── -->
  <div class="view" id="view-mensais">
    <div id="mensais-sections"></div>
  </div>

  <!-- ── ANEXOS (materiais) ── -->
  <div class="view" id="view-materiais">
    <div id="materiais-wrap"></div>
  </div>

</div>

<script>
const SHEET_ID = new URLSearchParams(location.search).get('sheet') || '1hATe94mNZ0AEH6kIsUL4irxCAx0FE2pNsAvrQmtW3dI';
const MACRO_COLORS = [
  {dark:'#2A5C3C', light:'#D4EAE0'},
{dark:'#4D8A2C', light:'#E0F0D4'},
{dark:'#84C44C', light:'#EAF5D4'},
{dark:'#F47D35', light:'#FDE8D8'},
{dark:'#1E4229', light:'#C8DFD4'},
{dark:'#C4621A', light:'#F8DDD0'},
];

const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function currentMonthName() { return MESES_PT[new Date().getMonth()]; }

const D = { config: {}, tarefas: [], entregasMensais: [], materiais: [], metricas: [] };

async function fetchCSV(tab) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
  const r = await fetch(url); const t = await r.text();
  return parseCSV(t);
}

function parseCSV(text) {
  const rows = []; let cur = ''; let inQ = false; let row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && text[i+1] === '\n') i++;
      row.push(cur.trim()); rows.push(row); row = []; cur = '';
    } else cur += c;
  }
  if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.replace(/^"|"$/g,'').trim());
  return rows.slice(1).filter(r => r.some(c => c)).map(r => {
    const obj = {};
    headers.forEach((h,i) => { obj[h] = (r[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  });
}

function statusTag(s) {
  const v = (s||'').toLowerCase();
  if (v.includes('conclu')) return `<span class="status-tag s-conc">✓ Concluído</span>`;
  if (v.includes('andamento')) return `<span class="status-tag s-em">◉ Em andamento</span>`;
  return `<span class="status-tag s-nao">○ Não iniciado</span>`;
}

function pct(total, done) { return total ? Math.round(done/total*100) : 0; }

// % ponderado: tarefa concluída conta 1, em andamento conta 0.5, não iniciada conta 0
function pctWeighted(tasks) {
  if (!tasks.length) return 0;
  const score = tasks.reduce((sum, t) => {
    const s = (t.status||'').toLowerCase();
    if (s.includes('conclu')) return sum + 1;
    if (s.includes('andamento')) return sum + 0.5;
    return sum;
  }, 0);
  return Math.round(score / tasks.length * 100);
}

// Agrupa tarefas por entregável (chave: macro+entregavel para evitar colisão)
function entregaveisDoMacro(tasks) {
  const map = new Map();
  tasks.forEach(t => {
    const k = (t.macro_nome||'') + '||' + (t.entregavel || 'Geral');
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(t);
  });
  return [...map.values()];
}

// Status de um entregável baseado em suas tarefas
function statusEntregavel(tasks) {
  const sts = tasks.map(t => (t.status||'').toLowerCase());
  if (sts.every(s => s.includes('conclu'))) return 'concluido';
  if (sts.some(s => s.includes('andamento') || s.includes('conclu'))) return 'em';
  return 'nao';
}

// Ícones (emoji) por palavra-chave no nome da atividade/entregável — sem dependência externa de webfont.
const ICONS_FALLBACK = ['✦','◆','●','▲','■','◇'];
function iconFor(name, idx) {
  const n = (name||'').toLowerCase();
  if (n.includes('rd station') || n.includes('crm') || n.includes('automa')) return '🚀';
  if (n.includes('acervo') || n.includes('material') || n.includes('imagens') || n.includes('biblioteca')) return '📁';
  if (n.includes('venda') || n.includes('loja') || n.includes('ecommerce') || n.includes('e-commerce') || n.includes('pedido')) return '🛒';
  if (n.includes('convers') || n.includes('funil') || n.includes('landing')) return '🎯';
  if (n.includes('campanha') || n.includes('retorno') || n.includes('reativa')) return '🔁';
  if (n.includes('post') || n.includes('social') || n.includes('instagram') || n.includes('rede')) return '📸';
  if (n.includes('newsletter') || n.includes('email') || n.includes('e-mail')) return '✉️';
  if (n.includes('relat') || n.includes('report') || n.includes('performance')) return '📊';
  if (n.includes('site') || n.includes('blog') || n.includes('conteúdo') || n.includes('conteudo')) return '📝';
  return ICONS_FALLBACK[idx % ICONS_FALLBACK.length];
}

function macroCardHTML(opts) {
  const { label, name, color, done, total, pctVal, inProg, onclick } = opts;
  return `
    <div class="macro-card" onclick="${onclick}">
      <div class="mc-head">
        <div class="mc-icon" style="background:${color.light}">${opts.icon}</div>
        <div>
          <div class="mc-num" style="color:${color.dark}">${label}</div>
          <div class="mc-name">${name}</div>
        </div>
      </div>
      <div class="mc-bar-wrap"><div class="mc-bar" style="width:${pctVal}%;background:${color.dark}"></div></div>
      <div class="mc-counts">
        <span>${done} de ${total} tarefas concluídas</span>
        <span class="done" style="color:${color.dark}">${pctVal}%</span>
      </div>
      ${inProg > 0 ? `<div style="margin-top:8px;font-size:10px;color:#8B6914;background:#FFF3CD;display:inline-block;padding:2px 8px;border-radius:10px;font-weight:700">${inProg} em andamento</div>` : ''}
    </div>`;
}

// Resumo (home): Setup e Entregas Mensais do mês atual aparecem sempre juntos,
// lado a lado — sem esconder uma fase atrás da outra.
function renderResumo() {
  document.getElementById('hero-title').textContent = D.config.nome_projeto || 'Yes We Grow';
  document.getElementById('hero-sub').textContent = D.config.descricao || 'Marketing digital · E-commerce · Reativação de marca';

  // ── Setup ──
  const ents = entregaveisDoMacro(D.tarefas);
  const totalSetup = ents.length;
  const concSetup = ents.filter(e => statusEntregavel(e) === 'concluido').length;
  const setupPct = pct(totalSetup, concSetup);
  document.getElementById('journey-setup-label').textContent = `Setup · ${setupPct}%`;

  const macros = getGroupedMacros(D.tarefas);
  const grid = document.getElementById('macro-grid');
  grid.innerHTML = '';
  macros.forEach((m, i) => {
    const mc = MACRO_COLORS[i % MACRO_COLORS.length];
    const done = m.tasks.filter(t => (t.status||'').toLowerCase().includes('conclu')).length;
    const inProg = m.tasks.filter(t => (t.status||'').toLowerCase().includes('andamento')).length;
    grid.innerHTML += macroCardHTML({
      label: `${m.num}. Atividade`, name: m.name, color: mc, icon: iconFor(m.name, i),
      done, total: m.tasks.length, pctVal: pctWeighted(m.tasks), inProg,
      onclick: `goToCronograma(${i})`,
    });
  });

  // ── Entregas mensais do mês atual ──
  const mes = currentMonthName();
  const monthTasks = D.entregasMensais.filter(t => (t.macro_nome || t.macro_num || '').trim().toLowerCase() === mes.toLowerCase());
  const entsMes = entregaveisDoMacro(monthTasks);
  const totalMes = entsMes.length;
  const concMes = entsMes.filter(e => statusEntregavel(e) === 'concluido').length;
  const pctMes = pct(totalMes, concMes);
  document.getElementById('journey-mensal-label').textContent = totalMes > 0 ? `Entregas mensais · ${pctMes}%` : 'Entregas mensais · recorrente';
  document.getElementById('mensal-resumo-title').textContent = `✦ Entregas de ${mes}`;

  const mensalGrid = document.getElementById('mensal-resumo-grid');
  mensalGrid.innerHTML = '';
  if (!monthTasks.length) {
    mensalGrid.innerHTML = `<div class="empty-msg">Nenhuma entrega cadastrada para ${mes} ainda.</div>`;
  } else {
    entsMes.forEach((tasks, i) => {
      const mc = MACRO_COLORS[i % MACRO_COLORS.length];
      const name = tasks[0].entregavel || 'Geral';
      const done = tasks.filter(t => (t.status||'').toLowerCase().includes('conclu')).length;
      const inProg = tasks.filter(t => (t.status||'').toLowerCase().includes('andamento')).length;
      mensalGrid.innerHTML += macroCardHTML({
        label: 'Entregável', name, color: mc, icon: iconFor(name, i),
        done, total: tasks.length, pctVal: pctWeighted(tasks), inProg,
        onclick: 'goToMensaisView()',
      });
    });
  }

  renderDestaques(macros);
}

// Destaques: pequenas pílulas com sinais relevantes — sem timestamp na planilha,
// são heurísticas representativas (macro 100%, macro com tarefas em andamento, métrica com maior alta).
function renderDestaques(macros) {
  const title = document.getElementById('destaques-title');
  const row = document.getElementById('destaques-row');
  const pills = [];

  const concluido = macros.find(m => pctWeighted(m.tasks) >= 100);
  if (concluido) pills.push(`<div class="destaque-pill" style="color:#2E6B2E">✓ ${concluido.name} concluído</div>`);

  const emAndamento = macros.find(m => m.tasks.some(t => (t.status||'').toLowerCase().includes('andamento')));
  if (emAndamento) {
    const n = emAndamento.tasks.filter(t => (t.status||'').toLowerCase().includes('andamento')).length;
    pills.push(`<div class="destaque-pill" style="color:#8B6914">◉ ${emAndamento.name}: ${n} tarefa${n>1?'s':''} em andamento</div>`);
  }

  const comAlta = (D.metricas||[])
    .map(m => ({ ...m, delta: (m.variacao || m['variação'] || '').trim() }))
    .filter(m => m.delta.startsWith('+') && m.nome);
  if (comAlta.length) {
    const top = comAlta.sort((a,b) => parseFloat(b.delta) - parseFloat(a.delta))[0];
    pills.push(`<div class="destaque-pill" style="color:#2E6B52">↑ ${top.nome} ${top.delta}</div>`);
  }

  if (!pills.length) { title.style.display = 'none'; row.innerHTML = ''; return; }
  title.style.display = 'block';
  row.innerHTML = pills.join('');
}

function getGroupedMacros(tasks) {
  const map = new Map();
  tasks.forEach(t => {
    const key = t.macro_nome || t.macro_num || '';
    if (!map.has(key)) map.set(key, { num: t.macro_num||'', name: t.macro_nome || t.macro_num || '', tasks: [] });
    map.get(key).tasks.push(t);
  });
  return [...map.values()];
}

function renderAccordion(tasks, wrapId, idPrefix, emptyMsg) {
  const macros = getGroupedMacros(tasks);
  const wrap = document.getElementById(wrapId);
  wrap.innerHTML = '';
  if (!macros.length) {
    wrap.innerHTML = `<div class="empty-msg">${emptyMsg}</div>`;
    return;
  }
  macros.forEach((m, i) => {
    const mc = MACRO_COLORS[i % MACRO_COLORS.length];
    // Progresso por tarefa (em andamento conta como 50%)
    const done = m.tasks.filter(t => (t.status||'').toLowerCase().includes('conclu')).length;
    const p2 = pctWeighted(m.tasks);

    // Exibição 3 níveis: Macro → Entregável → Tarefas
    const entMap = new Map();
    m.tasks.forEach(t => {
      const k = t.entregavel || 'Geral';
      if (!entMap.has(k)) entMap.set(k, []);
      entMap.get(k).push(t);
    });

    let entHTML = '';
    entMap.forEach((tasks2, ename) => {
      const taskRows = tasks2.map(t => `
        <div class="task-row">
          <div class="t-name">${t.tarefa || '—'}</div>
          <div>${statusTag(t.status)}</div>
        </div>`).join('');
      entHTML += `
        <div class="entregavel-block">
          <div class="entregavel-label">${ename}</div>
          <div class="task-header-row">
            <span>Tarefa</span><span>Status</span>
          </div>
          ${taskRows}
        </div>`;
    });

    const secId = `${idPrefix}-sec-${i}`;
    wrap.innerHTML += `
      <div class="macro-section" id="${secId}">
        <div class="macro-header" onclick="toggleMacro('${secId}')">
          <div class="macro-num-badge" style="background:${mc.light};color:${mc.dark}">${m.num||i+1}</div>
          <div class="macro-header-info">
            <h3>${m.name}</h3>
            <p>${m.tasks.length} tarefas · ${done} concluídas</p>
          </div>
          <div class="macro-prog-wrap">
            <div class="macro-mini-bar"><div class="macro-mini-fill" style="width:${p2}%;background:${mc.dark}"></div></div>
            <span class="macro-pct" style="color:${mc.dark}">${p2}%</span>
          </div>
          <span class="macro-chevron">▾</span>
        </div>
        <div class="macro-body">${entHTML}</div>
      </div>`;
  });
}

function renderCronograma() {
  renderAccordion(D.tarefas, 'cronograma-sections', 'setup', 'Nenhuma atividade cadastrada na aba Setup ainda.');
}

function renderEntregasMensais() {
  renderAccordion(D.entregasMensais, 'mensais-sections', 'mensal', 'Nenhuma entrega mensal cadastrada ainda. Preencha a aba "Entregas Mensais" na planilha.');
}

function renderMateriais() {
  const wrap = document.getElementById('materiais-wrap');
  wrap.innerHTML = '';
  const items = D.materiais.filter(m => m.titulo && m.link);
  if (!items.length) {
    wrap.innerHTML = `<div class="materiais-empty"><div class="icon">📂</div>Nenhum anexo adicionado ainda.<br>Preencha a aba <strong>anexos</strong> na planilha.</div>`;
    return;
  }
  // agrupar por macro
  const groups = new Map();
  items.forEach(m => {
    const g = m.macro || 'Geral';
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(m);
  });
  groups.forEach((docs, groupName) => {
    const cards = docs.map(d => `
      <a class="material-card" href="${d.link}" target="_blank" rel="noopener">
        ${d.entregavel ? `<div class="material-card-tag">${d.entregavel}</div>` : ''}
        <div class="material-card-title">${d.titulo}</div>
        ${d.descricao ? `<div class="material-card-desc">${d.descricao}</div>` : ''}
        <div class="material-card-link">↗ Abrir documento</div>
      </a>`).join('');
    wrap.innerHTML += `
      <div class="materiais-group">
        <div class="materiais-group-title">${groupName}</div>
        <div class="materiais-grid">${cards}</div>
      </div>`;
  });
}

function goToMensaisView() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-view="mensais"]').classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-mensais').classList.add('active');
}

function iconForMetric(name) {
  const n = (name||'').toLowerCase();
  if (n.includes('visualiza') || n.includes('alcance') || n.includes('instagram') || n.includes(' ig')) return '👁';
  if (n.includes('venda') || n.includes('faturamento') || n.includes('receita')) return '💰';
  if (n.includes('pedido') || n.includes('order')) return '📦';
  if (n.includes('seguidor') || n.includes('follower')) return '👥';
  return '📈';
}

// Cards de métricas da marca (aba "metricas": ordem, nome, valor, variacao)
function renderMetricas() {
  const wrap = document.getElementById('metric-grid');
  const title = document.getElementById('metricas-title');
  const items = D.metricas
    .filter(m => m.nome && m.valor)
    .sort((a, b) => (parseFloat(a.ordem) || 0) - (parseFloat(b.ordem) || 0));
  if (!items.length) { wrap.innerHTML = ''; title.style.display = 'none'; return; }
  title.style.display = 'block';
  wrap.innerHTML = items.map(m => {
    const delta = (m.variacao || m['variação'] || '').trim();
    let deltaClass = 'flat', arrow = '→';
    if (delta.startsWith('+')) { deltaClass = 'up'; arrow = '↑'; }
    else if (delta.startsWith('-')) { deltaClass = 'down'; arrow = '↓'; }
    return `
      <div class="metric-card">
        <div class="m-head">
          <div class="m-label">${m.nome}</div>
          <span class="m-icon">${iconForMetric(m.nome)}</span>
        </div>
        <div class="m-value">${m.valor}</div>
        ${delta ? `<div class="m-delta ${deltaClass}">${arrow} ${delta}</div>` : ''}
      </div>`;
  }).join('');
}

function toggleMacro(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function goToCronograma(macroIdx) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-view="cronograma"]').classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-cronograma').classList.add('active');
  setTimeout(() => {
    const el = document.getElementById(`setup-sec-${macroIdx}`);
    if (el) { el.classList.add('open'); el.scrollIntoView({behavior:'smooth',block:'start'}); }
  }, 100);
}

// Nav
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
  });
});

async function boot() {
  if (!SHEET_ID) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('hero-sub').textContent = 'Nenhuma planilha conectada. Adicione ?sheet=ID_DA_PLANILHA na URL.';
    return;
  }
  try {
    const [configRows, tarefaRows, mensaisRows, materiaisRows, metricasRows] = await Promise.all([
      fetchCSV('config'), fetchCSV('setup'), fetchCSV('entregas mensais'), fetchCSV('anexos'), fetchCSV('Métricas')
    ]);
    if (configRows.length) {
      const r = configRows[0];
      D.config = { nome_projeto: r.nome_projeto||'Yes We Grow', descricao: r.descricao||'', responsavel: r.responsavel||'' };
    }
    D.tarefas = tarefaRows.filter(r => r.tarefa);
    D.entregasMensais = mensaisRows.filter(r => r.tarefa);
    D.materiais = materiaisRows.filter(r => r.titulo);
    D.metricas = metricasRows.filter(r => r.nome);
    document.getElementById('last-update').textContent = 'Atualizado em ' + new Date().toLocaleDateString('pt-BR');
    renderResumo();
    renderCronograma();
    renderEntregasMensais();
    renderMateriais();
    renderMetricas();
  } catch(e) {
    document.getElementById('hero-sub').textContent = 'Erro ao carregar dados. Verifique se a planilha está pública.';
  }
  document.getElementById('loading').style.display = 'none';
}

boot();
</script>
</body>
</html>
